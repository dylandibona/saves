<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="35%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#1d4ed8" stop-opacity="0.85"/>
      <stop offset="55%" stop-color="#0f1c3a" stop-opacity="1"/>
      <stop offset="100%" stop-color="#0a0f1c" stop-opacity="1"/>
    </radialGradient>
    <radialGradient id="orb1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0f9d8a" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#0f9d8a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#be123c" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#be123c" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Rounded square base -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Jewel orb echoes -->
  <circle cx="120" cy="140" r="180" fill="url(#orb1)"/>
  <circle cx="400" cy="380" r="160" fill="url(#orb2)"/>
  <!-- Italic serif "S" — matches the wordmark voice -->
  <text
    x="50%"
    y="58%"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-style="italic"
    font-weight="500"
    font-size="320"
    fill="rgba(255,255,255,0.95)"
  >S</text>
</svg>
